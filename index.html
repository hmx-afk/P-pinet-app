<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pi App Journey</title>

  <script src="https://sdk.minepi.com/pi-sdk.js"></script>

</head>

    <h1>🚀 Pi App Journey</h1>
