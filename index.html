<body>

<div class="box">

  <h1>🚀 Pi App Journey</h1>

  <p>Connect your Pi Wallet</p>

  <button id="loginBtn">
    Start Wallet Login
  </button>

  <div id="status"></div>

</div>

<script>

window.addEventListener("DOMContentLoaded", () => {

  const status = document.getElementById("status");
  const btn = document.getElementById("loginBtn");

  if (typeof Pi === "undefined") {
    status.innerText = "Pi SDK not loaded ❌";
    return;
  }

  status.innerText = "Pi SDK Loaded ✔️";

  Pi.init({
    version: "2.0",
    sandbox: false
  });

  btn.addEventListener("click", async () => {

    try {

      status.innerText = "Opening Pi Wallet...";

      const scopes = ["username", "payments"];

      const auth = await Pi.authenticate(
        scopes,
        function(payment) {
          console.log(payment);
        }
      );

      console.log(auth);

      status.innerText =
        "Welcome " + auth.user.username + " ✔️";

    } catch (err) {

      console.error(err);

      status.innerText =
        "Login failed ❌";

    }

  });

});

</script>

</body>
