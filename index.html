<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Pi App Journey</title>

  <link rel="stylesheet" href="style.css">

  <!-- Pi SDK MUST LOAD FIRST -->
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>

<body>

  <header>🚀 Pi App Journey</header>

  <div class="container">

    <div class="card">

      <h2>Welcome 👋</h2>

      <p>Click below to connect Pi Wallet</p>

      <!-- LOGIN BUTTON -->
      <button onclick="loginPiUser()">
        Start Wallet Login
      </button>

      <br><br>

      <!-- PAYMENT BUTTON -->
      <button onclick="sendPiPayment()">
        Pay 0.1 Pi
      </button>

    </div>

  </div>

  <!-- SCRIPT MUST LOAD LAST -->
  <script src="script.js"></script>

</body>
</html>
