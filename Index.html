<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pi App Journey</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      padding: 20px;
      text-align: center;
      background: #1e293b;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      padding: 30px;
      text-align: center;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      margin: 15px auto;
      border-radius: 12px;
      max-width: 400px;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }
  </style>
</head>

<body>

  <header>
    🚀 Pi App Journey
  </header>

  <div class="container">

    <div class="card">
      <h2>Welcome</h2>
      <p>Your Pi app UI has been upgraded successfully.</p>
      <button>Get Started</button>
    </div>

  </div>

</body>
</html>
